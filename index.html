<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="저희의 소중한 날에 초대합니다">
    <meta property="og:description" content="2026년 4월 19일, 함께 축복해 주세요.">
    <meta property="og:image" content="이미지경로.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <title>불광클럽 회장 이취임식</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; background-color: #f2f2f2; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background-color: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .main-header { background-color: #1a2a44; color: #fff; padding: 0; text-align: center; }
        .main-img { width: 100%; display: block; }
        .content { padding: 50px 30px; text-align: center; }
        .title { font-family: 'Nanum Myeongjo', serif; font-size: 26px; color: #1a2a44; margin-bottom: 15px; font-weight: 700; }
        .subtitle { font-size: 16px; color: #c5a059; letter-spacing: 2px; margin-bottom: 40px; font-weight: 500; }
        .message { line-height: 2; font-size: 15px; color: #555; margin-bottom: 50px; font-weight: 300; }
        .info-section { border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 30px 0; margin-bottom: 40px; }
        .info-row { display: flex; justify-content: center; margin-bottom: 10px; font-size: 15px; }
        .label { font-weight: 500; color: #1a2a44; width: 60px; text-align: left; }
        .value { color: #666; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-header">
            <img src="main_design.png" alt="불광클럽 이취임식" class="main-img">
        </div>

        <div class="content">
            <div class="title">불광 배드민턴 클럽</div>
            <div class="subtitle">회장 이·취임식 초대</div>
            
            <div class="message">
                셔틀콕과 함께한 열정의 시간들,<br>
                그 소중한 랠리를 이어받아<br>
                불광클럽의 새로운 도약을 시작하려 합니다.<br><br>
                바쁘시더라도 부디 참석하시어<br>
                격려와 축복의 박수를 보내주시기 바랍니다.
            </div>

            <div class="info-section">
                <div class="info-row">
                    <span class="label">일시</span>
                    <span class="value">2026년 3월 28일(토) 오후 5시</span>
                </div>
                <div class="info-row">
                    <span class="label">장소</span>
                    <span class="value">불광체육관 내 연회장</span>
                </div>
            </div>
            
            <p style="font-size: 13px; color: #999;">불광 배드민턴 클럽 회원 일동 올림</p>
        </div>
    </div>
</body>
</html>
