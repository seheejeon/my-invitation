<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="저희의 소중한 날에 초대합니다">
    <meta property="og:description" content="2026년 4월 19일, 함께 축복해 주세요.">
    <meta property="og:image" content="이미지경로.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <title>초대합니다</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nanum Myeongjo', serif;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 480px; /* 모바일 폭 고정 */
            margin: 0 auto;
            background-color: #fff;
            padding-bottom: 50px;
        }
        .main-img {
            width: 100%;
            height: auto;
        }
        .content {
            padding: 40px 20px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #555; }
        .date { font-size: 16px; color: #888; margin-bottom: 30px; }
        .message { line-height: 1.8; font-size: 15px; margin-bottom: 40px; }
        .info-box {
            background-color: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="main_image.jpg" alt="Main Image" class="main-img">

        <div class="content">
            <h1>이은 & ㅇㅇㅇ</h1>
            <p class="date">2026년 00월 00일 토요일 오후 1시</p>
            
            <div class="message">
                서로가 마주 보며 다져온<br>
                따스한 약속의 자리에<br>
                소중한 분들을 초대합니다.
            </div>

            <div class="info-box">
                <strong>장소:</strong> OO컨벤션 웨딩홀 1층<br>
                <strong>오시는 길:</strong> 지하철 2호선 OO역 3번 출구
            </div>
        </div>
    </div>
</body>
</html>
